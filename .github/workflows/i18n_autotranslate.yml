name: i18n auto-translate

on:
  push:
    paths:
      - "i18n/en-US.json"
      - "i18n/zh-Hans.json"
      - "i18n/locales.json"
      - "scripts/i18n_autotranslate.py"
      - ".github/workflows/i18n_autotranslate.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: i18n-autotranslate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  translate:
    name: translate (${{ matrix.batch }})
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - batch: english-variants
            locales: en-AU,en-CA,en-GB
          - batch: europe-north
            locales: cs,da,fi,nl-NL,no,sv
          - batch: europe-west
            locales: de-DE,fr-CA,fr-FR
          - batch: europe-south
            locales: es-ES,it,pl,pt-PT,ro,tr
          - batch: asia-east
            locales: ja,ko,zh-Hant
          - batch: asia-south
            locales: hi,id,ms,th,vi

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install openai

      - name: Run auto-translate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_I18N_MODEL: gpt-5-mini
          OPENAI_TIMEOUT_SECONDS: "120"
          OPENAI_I18N_BATCH_SIZE: "20"
          OPENAI_I18N_MAX_ATTEMPTS: "4"
          OPENAI_I18N_LOCALES: ${{ matrix.locales }}
          PYTHONUNBUFFERED: "1"
        run: |
          python scripts/i18n_autotranslate.py

      - name: Check batch quality
        env:
          OPENAI_I18N_LOCALES: ${{ matrix.locales }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          failed = []
          for code in [part.strip() for part in os.environ["OPENAI_I18N_LOCALES"].split(",") if part.strip()]:
              path = Path("i18n") / f"{code}.json"
              data = json.loads(path.read_text(encoding="utf-8"))
              meta = data.get("_meta", {})
              fallback_keys = meta.get("fallback_keys", []) if isinstance(meta, dict) else []
              pending = meta.get("pending_translation") is True if isinstance(meta, dict) else False
              if fallback_keys or pending:
                  failed.append((code, len(fallback_keys), pending, fallback_keys[:12]))

          if failed:
              for code, count, pending, sample in failed:
                  print(f"{code}: fallback_keys={count}, pending_translation={pending}, sample={sample}")
              sys.exit("Batch still has fallback or pending translations; not committing partial localization.")
          PY

      - name: Validate JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          for path in sorted(Path("i18n").glob("*.json")):
              json.loads(path.read_text(encoding="utf-8"))
              print(path)
          PY

      - name: Commit translated locales
        env:
          OPENAI_I18N_LOCALES: ${{ matrix.locales }}
        run: |
          git config user.name "i18n-bot"
          git config user.email "i18n-bot@users.noreply.github.com"
          files=""
          IFS=',' read -ra locales <<< "${OPENAI_I18N_LOCALES}"
          for code in "${locales[@]}"; do
            files="${files} i18n/${code}.json"
          done
          git add ${files}
          git diff --cached --quiet && echo "No i18n changes" && exit 0
          git commit -m "chore(i18n): auto-translate ${{ matrix.batch }}"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin "${GITHUB_REF_NAME}"
            if git push origin HEAD:${GITHUB_REF_NAME}; then
              exit 0
            fi
            sleep $((attempt * 8))
          done
          exit 1
