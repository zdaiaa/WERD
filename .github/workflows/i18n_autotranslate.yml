name: i18n auto-translate

on:
  push:
    paths:
      - "i18n/en-US.json"
      - "i18n/zh-Hans.json"
      - "i18n/locales.json"
      - "scripts/i18n_autotranslate.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: i18n-autotranslate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  translate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install openai

      - name: Run auto-translate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_I18N_MODEL: gpt-5-mini
          OPENAI_TIMEOUT_SECONDS: "90"
          OPENAI_I18N_BATCH_SIZE: "16"
          PYTHONUNBUFFERED: "1"
        run: |
          python scripts/i18n_autotranslate.py

      - name: Validate JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          for path in sorted(Path("i18n").glob("*.json")):
              json.loads(path.read_text(encoding="utf-8"))
              print(path)
          PY

      - name: Commit translated locales
        run: |
          git config user.name "i18n-bot"
          git config user.email "i18n-bot@users.noreply.github.com"
          git add i18n/*.json
          git diff --cached --quiet && echo "No i18n changes" && exit 0
          git commit -m "chore(i18n): auto-translate"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:${GITHUB_REF_NAME}
